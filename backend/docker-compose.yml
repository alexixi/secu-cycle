services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bike_app
      POSTGRES_USER: bike_user
      POSTGRES_PASSWORD: bike_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://bike_user:bike_password@db:5432/bike_app
    depends_on:
      - db

volumes:
  postgres_data:
